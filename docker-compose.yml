services:
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: giokaraoke-search
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-karaoke-secret-key}
      - MEILI_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: giokaraoke-app
    ports:
      - "8094:3000"
    volumes:
      - ${SONGS_PATH:-./songs}:/songs:ro
    environment:
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILI_MASTER_KEY:-karaoke-secret-key}
      - SONGS_PATH=/songs
      - PORT=3000
      - PROCESSOR_URL=http://processor:5000
    depends_on:
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: giokaraoke-processor
    environment:
      - MODEL_CACHE=/model_cache
    volumes:
      # Persist AI model downloads across container restarts (~500 MB)
      - model_cache:/model_cache
      # Temp working dir: OS-managed, no persistent user data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  meilisearch_data:
  model_cache:
